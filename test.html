<!DOCTYPE html>
<html>

<body>
    <div id="app">
        <h1>标题</h1>
        <button onclick="changeText()">点击</button>
    </div>

    <script>
        function changeText() {
            document.querySelector('h1').innerText = '文字变了';
        }
    </script>
</body>

</html>
